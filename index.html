<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monster Mash Survivor</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    color:white;
}

canvas{
    display:block;
    background:radial-gradient(circle at center,#222,#111);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    font-size:20px;
    line-height:1.5;
}

#upgradeMenu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:#222;
    border:4px solid white;
    border-radius:20px;
    padding:20px;
    z-index:20;
    display:none;
    text-align:center;
}

.upgradeBtn{
    background:#444;
    margin:10px 0;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    font-size:20px;
}

.upgradeBtn:hover{
    background:#666;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    display:none;
    z-index:30;
}

button{
    padding:10px 20px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
❤️ HP: <span id="hp">100</span> / 100<br>
⚔️ Round: <span id="round">1</span><br>
👾 Enemies: <span id="left">0</span><br>
⭐ Level: <span id="level">1</span><br>
🛡️ Guards: <span id="guardCount">0</span>/<span id="maxGuards">0</span>
</div>

<div id="upgradeMenu">
<h2>Choose An Upgrade</h2>
<div id="choices"></div>
</div>

<div id="gameOver">
<h1>GAME OVER</h1>
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const keys = {};
const mouse = {x:0,y:0};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
    
    if(e.key.toLowerCase() === "q" && !paused && abilities.guards) {
        spawnGuard();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("mousemove",e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

const player = {
    x:canvas.width/2,
    y:canvas.height/2,
    r:20,
    speed:4,
    hp:100,
    damage:15,
    fireRate:320,
    bullets:[],
    level:1
};

const abilities = {
    speedArrows:null,
    bubbles:null,
    feathers:null,
    bananas:null,
    pizza:null,
    darkEnergy:null,
    guards:null,
    vampiric:null,      // New
    frostNova:null,     // New
    chainLightning:null,// New
    singularity:null    // New
};

let enemies = [];
let guards = []; 
let particles = [];
let damageTexts = [];
let singularities = []; // Track active black holes
let round = 1;
let paused = false;

class Enemy{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.r = 20;
        this.baseSpeed = 1 + round*0.15; 
        this.speed = this.baseSpeed;
        this.hp = 35 + round*8;
        this.color = `hsl(${Math.random()*360},80%,60%)`;
        this.flash = 0;
        
        // New mechanics states
        this.frozenTimer = 0;
    }

    update(){
        // If frozen by Frost Nova, stall movement
        if(this.frozenTimer > 0) {
            this.frozenTimer--;
            if(this.flash > 0) this.flash--;
            return; 
        }

        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let dist = Math.hypot(dx,dy);

        // Apply Gravity Singularity pull if nearby
        singularities.forEach(s => {
            let sDist = Math.hypot(s.x - this.x, s.y - this.y);
            if(sDist < s.radius) {
                let sdx = s.x - this.x;
                let sdy = s.y - this.y;
                this.x += (sdx / sDist) * 3;
                this.y += (sdy / sDist) * 3;
            }
        });

        this.x += dx/dist * this.speed;
        this.y += dy/dist * this.speed;

        if(dist < this.r + player.r){
            player.hp -= 0.15;
        }

        if(this.flash > 0){
            this.flash--;
        }
        
        this.speed = this.baseSpeed; 
    }

    draw(){
        if(this.frozenTimer > 0) {
            ctx.fillStyle = "#a6f2ff"; // Ice color
        } else {
            ctx.fillStyle = this.flash > 0 ? "white" : this.color;
        }

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        // Ice overlay border
        if(this.frozenTimer > 0) {
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // eyes
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(this.x-6,this.y-5,3,0,Math.PI*2);
        ctx.arc(this.x+6,this.y-5,3,0,Math.PI*2);
        ctx.fill();

        // mouth
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x,this.y+3,7,0,Math.PI);
        ctx.stroke();
    }
}

class Guard {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 14;
        this.speed = 3.5;
        this.damage = 1.2; 
    }

    update() {
        let target = nearestEnemy(this.x, this.y);
        if (target) {
            let dx = target.x - this.x;
            let dy = target.y - this.y;
            let dist = Math.hypot(dx, dy);

            if (dist > 0) {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }

            if (dist < this.r + target.r) {
                damageEnemy(target, this.damage, dx / dist, dy / dist, "guard");
                
                if (target.hp <= 0) {
                    let index = enemies.indexOf(target);
                    if (index > -1) enemies.splice(index, 1);
                }
            }
        } else {
            let dx = player.x - this.x;
            let dy = player.y - this.y;
            let dist = Math.hypot(dx, dy);
            if (dist > 40) {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        }
    }

    draw() {
        ctx.save();
        ctx.fillStyle = "#47ff9c";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#116b3d";
        ctx.beginPath();
        ctx.arc(this.x, this.y + 2, 6, 0, Math.PI, true);
        ctx.lineTo(this.x, this.y - 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }
}

class Projectile{
    constructor(x,y,dx,dy,size,color,damage,type){
        this.x=x;
        this.y=y;
        this.dx=dx;
        this.dy=dy;
        this.size=size;
        this.color=color;
        this.damage=damage;
        this.life=300;
        this.type=type;
        this.returning=false;
        this.rotation=0;
    }

    update(){
        this.x += this.dx;
        this.y += this.dy;
        this.life--;
        this.rotation += 0.15;
    }

    draw(){
        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.rotate(this.rotation);

        if(this.type === "bullet"){
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(0,0,this.size,0,Math.PI*2);
            ctx.fill();
        }
        else if(this.type === "banana"){
            ctx.fillStyle = "gold";
            ctx.beginPath();
            ctx.arc(0,0,12,0.3,2.7);
            ctx.lineWidth = 6;
            ctx.strokeStyle = "gold";
            ctx.stroke();
        }
        else if(this.type === "pizza"){
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.moveTo(-14,-12);
            ctx.lineTo(14,0);
            ctx.lineTo(-14,12);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(-4,-2,2,0,Math.PI*2);
            ctx.arc(-2,5,2,0,Math.PI*2);
            ctx.arc(2,0,2,0,Math.PI*2);
            ctx.fill();
        }
        else if(this.type === "feather"){
            ctx.fillStyle = "lime";
            ctx.beginPath();
            ctx.ellipse(0,0,5,14,0,0,Math.PI*2);
            ctx.fill();

            ctx.strokeStyle = "cyan";
            ctx.beginPath();
            ctx.moveTo(0,-10);
            ctx.lineTo(0,10);
            ctx.stroke();
        }
        else if(this.type === "bubble"){
            ctx.fillStyle = "rgba(120,220,255,0.5)";
            ctx.strokeStyle = "skyblue";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0,0,this.size,0,Math.PI*2);
            ctx.fill();
            ctx.stroke();
        }
        else if(this.type === "arrow"){
            ctx.fillStyle = "cyan";
            ctx.beginPath();
            ctx.moveTo(12,0);
            ctx.lineTo(-10,-5);
            ctx.lineTo(-10,5);
            ctx.closePath();
            ctx.fill();
        }

        ctx.restore();
    }
}

class DamageText{
    constructor(x,y,text,color){
        this.x=x;
        this.y=y;
        this.text=text;
        this.color=color;
        this.life=50;
    }

    update(){
        this.y -= 1;
        this.life--;
    }

    draw(){
        ctx.fillStyle = this.color;
        ctx.font = "18px Arial";
        ctx.fillText(this.text,this.x,this.y);
    }
}

// Visual indicator for lightning arcs
class LightningArc {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1; this.y1 = y1;
        this.x2 = x2; this.y2 = y2;
        this.life = 10;
    }
    draw() {
        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x1, this.y1);
        // Create a jagged look mid-point
        let midX = (this.x1 + this.x2) / 2 + (Math.random() - 0.5) * 15;
        let midY = (this.y1 + this.y2) / 2 + (Math.random() - 0.5) * 15;
        ctx.lineTo(midX, midY);
        ctx.lineTo(this.x2, this.y2);
        ctx.stroke();
        this.life--;
    }
}
let arcs = [];

function damageEnemy(enemy,damage,dx,dy,sourceType){
    // Frost Nova shatter mechanic
    if(enemy.frozenTimer > 0 && sourceType !== "darkEnergy") {
        if(Math.random() < 0.25) { // 25% chance to shatter
            damage *= 2.5;
            damageTexts.push(new DamageText(enemy.x, enemy.y - 40, "SHATTER!", "#00e5ff"));
        }
    }

    enemy.hp -= damage; 
    enemy.flash = 4;

    if(sourceType !== "guard" && sourceType !== "darkEnergy" && enemy.frozenTimer <= 0) {
        enemy.x += dx * 6;
        enemy.y += dy * 6;
    }

    // Vampiric Essence (Life Steal Chance on Hit)
    if(abilities.vampiric && Math.random() < abilities.vampiric.chance) {
        let healAmt = Math.min(2, 100 - player.hp);
        if(healAmt > 0) {
            player.hp += healAmt;
            damageTexts.push(new DamageText(player.x, player.y - 25, "+" + Math.floor(healAmt) + " HP", "#4eff47"));
        }
    }

    // Chain Lightning Hook
    if(sourceType === "bullet" && abilities.chainLightning && !enemy.hasChained) {
        enemy.hasChained = true; // prevent infinite loop loops
        triggerChainLightning(enemy, damage * 0.6, abilities.chainLightning.bounces);
    }

    let displayDamage = Math.floor(damage);
    if (displayDamage === 0 && Math.random() < 0.15) {
        displayDamage = 1; 
    }

    if (displayDamage > 0) {
        damageTexts.push(
            new DamageText(
                enemy.x + (Math.random()*20-10),
                enemy.y - 20,
                "-" + displayDamage,
                "white"
            )
        );
    }
}

function triggerChainLightning(startEnemy, chainDmg, maxBounces) {
    let currentSource = startEnemy;
    let bouncedTargets = [startEnemy];

    for(let b = 0; b < maxBounces; b++) {
        let closestNext = null;
        let closestDist = 200; // bounce range limit

        enemies.forEach(e => {
            if(!bouncedTargets.includes(e)) {
                let d = Math.hypot(e.x - currentSource.x, e.y - currentSource.y);
                if(d < closestDist) {
                    closestDist = d;
                    closestNext = e;
                }
            }
        });

        if(closestNext) {
            arcs.push(new LightningArc(currentSource.x, currentSource.y, closestNext.x, closestNext.y));
            closestNext.hp -= chainDmg;
            closestNext.flash = 4;
            damageTexts.push(new DamageText(closestNext.x, closestNext.y - 20, "-" + Math.floor(chainDmg), "#00ffff"));
            
            bouncedTargets.push(closestNext);
            currentSource = closestNext;
        } else {
            break; 
        }
    }
    
    // Clean up temporary flag next frame loop
    enemies.forEach(e => e.hasChained = false);
}

function spawnWave(){
    enemies = [];
    let amount = 5 + round*3;

    for(let i=0;i<amount;i++){
        enemies.push(new Enemy());
    }
    updateUI();
}

function spawnGuard() {
    if (abilities.guards && guards.length < abilities.guards.max) {
        guards.push(new Guard(player.x, player.y));
    }
}

spawnWave();

function nearestEnemy(x,y){
    let closest = null;
    let best = Infinity;

    enemies.forEach(e=>{
        let d = Math.hypot(e.x-x,e.y-y);
        if(d < best){
            best = d;
            closest = e;
        }
    });
    return closest;
}

// Default shooting loop
setInterval(()=>{
    if(paused) return;

    let angle = Math.atan2(mouse.y-player.y,mouse.x-player.x);
    player.bullets.push(
        new Projectile(
            player.x,
            player.y,
            Math.cos(angle)*9,
            Math.sin(angle)*9,
            5,
            "yellow",
            player.damage,
            "bullet"
        )
    );
},player.fireRate);

// SPEED ARROWS
setInterval(()=>{
    if(paused || !abilities.speedArrows) return;

    let mx = 0; let my = 0;
    if(keys["w"]) my -= 1;
    if(keys["s"]) my += 1;
    if(keys["a"]) mx -= 1;
    if(keys["d"]) mx += 1;
    if(mx===0 && my===0) return;

    let angle = Math.atan2(my,mx);

    for(let i=0;i<abilities.speedArrows.count;i++){
        let spread = (i-(abilities.speedArrows.count-1)/2)*0.25;
        player.bullets.push(
            new Projectile(
                player.x,
                player.y,
                Math.cos(angle+spread)*12,
                Math.sin(angle+spread)*12,
                6,
                "cyan",
                12,
                "arrow"
            )
        );
    }
},500);

// BUBBLES
setInterval(()=>{
    if(paused || !abilities.bubbles) return;

    for(let i=0;i<abilities.bubbles.level;i++){
        player.bullets.push(
            new Projectile(
                player.x,
                player.y,
                (Math.random()-0.5)*4,
                -3-Math.random()*2,
                12+abilities.bubbles.level*2,
                "skyblue",
                18,
                "bubble"
            )
        );
    }
},1200);

// FEATHERS
setInterval(()=>{
    if(paused || !abilities.feathers) return;

    let target = nearestEnemy(player.x,player.y);
    if(!target) return;

    let angle = Math.atan2(target.y-player.y,target.x-player.x);

    for(let i=0;i<abilities.feathers.level;i++){
        let spread = (Math.random()-0.5)*0.4;
        player.bullets.push(
            new Projectile(
                player.x,
                player.y,
                Math.cos(angle+spread)*10,
                Math.sin(angle+spread)*10,
                7,
                "lime",
                18,
                "feather"
            )
        );
    }
},700);

// BANANAS
setInterval(()=>{
    if(paused || !abilities.bananas) return;

    let target = nearestEnemy(player.x,player.y);
    if(!target) return;

    let angle = Math.atan2(target.y-player.y,target.x-player.x);

    let banana = new Projectile(
        player.x,
        player.y,
        Math.cos(angle)*7,
        Math.sin(angle)*7,
        12,
        "gold",
        26,
        "banana"
    );
    banana.curve = 0.08;
    player.bullets.push(banana);
},1400);

// PIZZA
setInterval(()=>{
    if(paused || !abilities.pizza) return;

    let angle = Math.atan2(mouse.y-player.y,mouse.x-player.x);

    let pizza = new Projectile(
        player.x,
        player.y,
        Math.cos(angle)*8,
        Math.sin(angle)*8,
        15,
        "orange",
        35,
        "pizza"
    );
    pizza.returning = false;
    player.bullets.push(pizza);
},2000);

// FROST NOVA INTERVAL LOOP
let frostNovaRadius = 0;
let frostNovaActive = false;
setInterval(() => {
    if(paused || !abilities.frostNova) return;
    frostNovaActive = true;
    frostNovaRadius = 0;
}, 4500);

// GRAVITY SINGULARITY INTERVAL LOOP
setInterval(() => {
    if(paused || !abilities.singularity) return;
    singularities.push({
        x: mouse.x,
        y: mouse.y,
        radius: abilities.singularity.radius,
        life: 180 // 3 seconds at 60fps
    });
}, 6000);

function update(){
    if(paused) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.x = Math.max(player.r,Math.min(canvas.width-player.r,player.x));
    player.y = Math.max(player.r,Math.min(canvas.height-player.r,player.y));

    // FROST NOVA WAVE EXPANSION UPDATE
    if(frostNovaActive && abilities.frostNova) {
        frostNovaRadius += 8;
        enemies.forEach(e => {
            let d = Math.hypot(e.x - player.x, e.y - player.y);
            if(Math.abs(d - frostNovaRadius) < 15 && e.frozenTimer <= 0) {
                e.frozenTimer = abilities.frostNova.duration;
            }
        });
        if(frostNovaRadius > canvas.width) {
            frostNovaActive = false;
        }
    }

    // GRAVITY SINGULARITY LIFESPAN UPDATE
    singularities.forEach((s, idx) => {
        s.life--;
        if(s.life <= 0) singularities.splice(idx, 1);
    });

    // DARK ENERGY (WITH SLOW DOWN)
    if(abilities.darkEnergy){
        enemies.forEach((e,ei)=>{
            let dist = Math.hypot(player.x-e.x,player.y-e.y);

            if(dist < abilities.darkEnergy.radius){
                e.speed = e.baseSpeed * 0.5;

                let dx = (e.x-player.x)/dist;
                let dy = (e.y-player.y)/dist;

                damageEnemy(e, abilities.darkEnergy.damage, dx, dy, "darkEnergy");
            }
        });
    }

    guards.forEach(g => g.update());

    player.bullets.forEach((b,bi)=>{
        b.update();

        if(b.curve){
            b.dy += b.curve;
        }

        if(b.type === "pizza"){
            if(!b.returning && b.life < 180){
                b.returning = true;
            }
            if(b.returning){
                let dx = player.x - b.x;
                let dy = player.y - b.y;
                let dist = Math.hypot(dx,dy);

                b.dx += dx/dist * 0.3;
                b.dy += dy/dist * 0.3;
            }
        }

        enemies.forEach((e,ei)=>{
            let dist = Math.hypot(b.x-e.x,b.y-e.y);

            if(dist < b.size + e.r){
                let dx = (e.x-b.x)/dist;
                let dy = (e.y-b.y)/dist;

                damageEnemy(e,b.damage,dx,dy,"bullet");

                if(b.type !== "pizza"){
                    player.bullets.splice(bi,1);
                }
            }
        });

        if(b.life <= 0){
            player.bullets.splice(bi,1);
        }
    });

    // Filter out dead enemies completely in one pass safely
    enemies = enemies.filter(e => e.hp > 0);

    damageTexts.forEach((d,i)=>{
        d.update();
        if(d.life <= 0){
            damageTexts.splice(i,1);
        }
    });

    enemies.forEach(e=>e.update());

    if(enemies.length === 0){
        paused = true;
        showUpgrades();
    }

    if(player.hp <= 0){
        paused = true;
        document.getElementById("gameOver").style.display = "block";
    }

    updateUI();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // DRAW GRAVITY SINGULARITIES
    singularities.forEach(s => {
        let grad = ctx.createRadialGradient(s.x, s.y, 5, s.x, s.y, s.radius);
        grad.addColorStop(0, "rgba(0,0,0,1)");
        grad.addColorStop(0.3, "rgba(50,10,90,0.8)");
        grad.addColorStop(1, "rgba(130,0,255,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
        ctx.fill();
    });

    // DARK ENERGY VISUAL
    if(abilities.darkEnergy){
        let g = ctx.createRadialGradient(
            player.x,
            player.y,
            10,
            player.x,
            player.y,
            abilities.darkEnergy.radius
        );

        g.addColorStop(0,"rgba(150,0,255,0.45)");
        g.addColorStop(1,"rgba(150,0,255,0)");

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(player.x, player.y, abilities.darkEnergy.radius, 0, Math.PI*2);
        ctx.fill();
    }

    // DRAW FROST NOVA WAVE EFFECT
    if(frostNovaActive && abilities.frostNova) {
        ctx.strokeStyle = "rgba(130, 235, 255, 0.4)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(player.x, player.y, frostNovaRadius, 0, Math.PI*2);
        ctx.stroke();
    }

    // PLAYER
    ctx.fillStyle = "#4de1ff";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();

    // gun
    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(player.x,player.y);
    ctx.lineTo(mouse.x,mouse.y);
    ctx.stroke();

    player.bullets.forEach(b=>b.draw());
    guards.forEach(g => g.draw());
    enemies.forEach(e=>e.draw());
    damageTexts.forEach(d=>d.draw());

    // Render & cleanup lightning arcs
    arcs.forEach((arc, index) => {
        arc.draw();
        if(arc.life <= 0) arcs.splice(index, 1);
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

function updateUI(){
    document.getElementById("hp").textContent = Math.max(0, Math.floor(player.hp));
    document.getElementById("round").textContent = round;
    document.getElementById("left").textContent = enemies.length;
    document.getElementById("level").textContent = player.level;
    
    document.getElementById("guardCount").textContent = guards.length;
    document.getElementById("maxGuards").textContent = abilities.guards ? abilities.guards.max : 0;
}

function showUpgrades(){
    const menu = document.getElementById("upgradeMenu");
    const choices = document.getElementById("choices");

    menu.style.display = "block";
    choices.innerHTML = "";

    const upgrades = [
        {
            name:"⚡ Faster Shooting",
            effect:()=>{ player.fireRate = Math.max(100,player.fireRate-40); }
        },
        {
            name:"💥 More Damage",
            effect:()=>{ player.damage += 6; }
        },
        {
            name:"👟 More Speed",
            effect:()=>{ player.speed += 0.6; }
        },
        {
            name:"❤️ Heal",
            effect:()=>{ player.hp = Math.min(100, player.hp + 30); }
        },
        {
            name:"🏹 Speeding Arrows",
            effect:()=>{
                if(!abilities.speedArrows){ abilities.speedArrows = {count:1}; } 
                else { abilities.speedArrows.count = Math.min(5,abilities.speedArrows.count+1); }
            }
        },
        {
            name:"🫧 Booing Bubbles",
            effect:()=>{
                if(!abilities.bubbles){ abilities.bubbles = {level:1}; } 
                else { abilities.bubbles.level++; }
            }
        },
        {
            name:"🦚 Peacock Feathers",
            effect:()=>{
                if(!abilities.feathers){ abilities.feathers = {level:1}; } 
                else { abilities.feathers.level++; }
            }
        },
        {
            name:"🍌 Cruin Bananas",
            effect:()=>{
                if(!abilities.bananas){ abilities.bananas = {level:1}; } 
                else { abilities.bananas.level++; }
            }
        },
        {
            name:"🍕 Boomerang Pizza",
            effect:()=>{
                if(!abilities.pizza){ abilities.pizza = {level:1}; } 
                else { abilities.pizza.level++; }
            }
        },
        {
            name:"🌑 Dark Energy",
            effect:()=>{
                if(!abilities.darkEnergy){
                    abilities.darkEnergy = { radius:80, damage:0.85 };
                } else {
                    abilities.darkEnergy.radius += 20;
                    abilities.darkEnergy.damage += 0.45;
                }
            }
        },
        {
            name:"🛡️ Guard Capacity +1",
            effect:()=>{
                if(!abilities.guards){ abilities.guards = { max: 1 }; } 
                else { abilities.guards.max += 1; }
            }
        },
        {
            name:"🧛 Vampiric Essence",
            effect:()=>{
                if(!abilities.vampiric){ abilities.vampiric = { chance: 0.08 }; } 
                else { abilities.vampiric.chance = Math.min(0.25, abilities.vampiric.chance + 0.05); }
            }
        },
        {
            name:"🧊 Frost Nova",
            effect:()=>{
                if(!abilities.frostNova){ abilities.frostNova = { duration: 120 }; } 
                else { abilities.frostNova.duration += 60; }
            }
        },
        {
            name:"⚡ Chain Lightning",
            effect:()=>{
                if(!abilities.chainLightning){ abilities.chainLightning = { bounces: 2 }; } 
                else { abilities.chainLightning.bounces += 1; }
            }
        },
        {
            name:"🧲 Gravity Singularity",
            effect:()=>{
                if(!abilities.singularity){ abilities.singularity = { radius: 150 }; } 
                else { abilities.singularity.radius += 40; }
            }
        }
    ];

    upgrades.sort(()=>Math.random()-0.5);

    for(let i=0;i<3;i++){
        const up = upgrades[i];
        const div = document.createElement("div");

        div.className = "upgradeBtn";
        div.innerHTML = up.name;

        div.onclick = ()=>{
            up.effect();
            menu.style.display = "none";
            round++;
            player.level++;
            paused = false;
            spawnWave();
        };
        choices.appendChild(div);
    }
}
</script>
